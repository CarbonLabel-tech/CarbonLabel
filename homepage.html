<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbonLabel - Intelligence Infra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              carbon: '#262626',
            }
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4?dev&deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?dev&deps=react@18.2.0"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import ReactDOM from 'react-dom/client';
        import { motion, AnimatePresence } from 'framer-motion';
        import { 
          ScanLine, 
          Type, 
          Mic, 
          Video, 
          CheckCircle2, 
          Cpu, 
          Network, 
          Database, 
          ArrowRight, 
          Menu, 
          X, 
          BrainCircuit,
          Layers,
          Code2,
          Building2,
          FileSearch,
          ShieldCheck,
          Scale,
          MousePointer2,
          GitCommit,
          Share2
        } from 'lucide-react';

        // --- Animation Utility ---

        const FadeIn = ({ children, delay = 0, className = "" }) => (
          <motion.div
            initial={{ opacity: 0, y: 10 }}
            whileInView={{ opacity: 1, y: 0 }}
            viewport={{ once: true, margin: "-20px" }}
            transition={{ duration: 0.2, delay: delay, ease: "easeOut" }}
            className={className}
          >
            {children}
          </motion.div>
        );        // --- Components ---

        const Button = ({ children, variant = 'primary', className = '', ...props }) => {
          const baseStyle = "px-6 py-3 font-bold flex items-center justify-center gap-2 rounded-lg text-sm transition-all duration-200 w-full sm:w-auto relative overflow-hidden group font-mono tracking-tight"; 
          
          const variants = {
            primary: "bg-[#0f172a] hover:bg-[#1e293b] text-white shadow-lg shadow-blue-900/20 hover:shadow-blue-900/30 hover:-translate-y-0.5 border border-slate-800",
            secondary: "bg-white border-2 border-slate-200 text-slate-700 hover:border-[#0f172a] hover:text-[#0f172a]",
            outline: "bg-transparent text-slate-500 hover:text-[#0f172a] font-medium"
          };

          return (
            <motion.button 
              whileTap={{ scale: 0.98 }}
              className={`${baseStyle} ${variants[variant]} ${className}`} 
              {...props}
            >
              {/* Tech decoration on hover for primary button */}
              {variant === 'primary' && (
                <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-10 pointer-events-none">
                   <div className="w-full h-[1px] bg-white absolute top-1/2"></div>
                   <div className="h-full w-[1px] bg-white absolute left-1/2"></div>
                </div>
              )}
              <span className="relative z-10 flex items-center gap-2">{children}</span>
            </motion.button>
          );
        };

        // Fundo: Grid geométrico + Circuitos
        const InfraBackground = () => (
          <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none bg-white">
            {/* Grid Base */}
            <div className="absolute inset-0 bg-[linear-gradient(to_right,#f1f5f9_1px,transparent_1px),linear-gradient(to_bottom,#f1f5f9_1px,transparent_1px)] bg-[size:3rem_3rem] md:bg-[size:4rem_4rem]"></div>
            
            {/* Circuit Lines Overlay */}
            <svg className="absolute inset-0 w-full h-full opacity-[0.6]" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
                  <circle cx="1" cy="1" r="1" fill="#cbd5e1" opacity="0.5" />
                </pattern>
              </defs>
              {/* Pontos de grade sutis */}
              <rect width="100%" height="100%" fill="url(#smallGrid)" />

                    {/* Linhas de conexão estilo circuito (Desktop) */}
                    <g className="hidden md:block" stroke="#cbd5e1" strokeWidth="1" fill="none">
                      <path d="M0 100 H 100 V 200 H 300" strokeDasharray="4 4" />
                      <circle cx="300" cy="200" r="3" fill="#3b82f6" className="animate-pulse" />
                      
                      {/* Replaced invalid path with lines supporting percentages */}
                      <line x1="90%" y1="400" x2="80%" y2="400" strokeDasharray="4 4" />
                      <line x1="80%" y1="400" x2="80%" y2="600" strokeDasharray="4 4" />
                      <line x1="80%" y1="600" x2="60%" y2="600" strokeDasharray="4 4" />
                      
                      <circle cx="60%" cy="600" r="3" fill="#22c55e" className="animate-pulse" />
              
                      <line x1="50%" y1="0" x2="50%" y2="100" stroke="#e2e8f0" />
                    </g>            </svg>

            <div className="absolute right-0 top-0 w-full md:w-1/2 h-full bg-gradient-to-b md:bg-gradient-to-l from-blue-50/30 to-transparent"></div>
          </div>
        );

        // Card com cantos técnicos
        const ServiceCard = ({ icon: Icon, title, description, features }) => (
          <motion.div 
            whileHover={{ y: -4 }}
            className="group relative bg-white border border-slate-200 p-6 md:p-8 rounded-lg hover:shadow-xl hover:shadow-blue-900/5 hover:border-blue-400/50 transition-all duration-300 overflow-hidden"
          >
            {/* Tech Corners */}
            <div className="absolute top-0 left-0 w-2 h-2 border-t-2 border-l-2 border-slate-300 group-hover:border-blue-500 transition-colors"></div>
            <div className="absolute top-0 right-0 w-2 h-2 border-t-2 border-r-2 border-slate-300 group-hover:border-blue-500 transition-colors"></div>
            <div className="absolute bottom-0 left-0 w-2 h-2 border-b-2 border-l-2 border-slate-300 group-hover:border-blue-500 transition-colors"></div>
            <div className="absolute bottom-0 right-0 w-2 h-2 border-b-2 border-r-2 border-slate-300 group-hover:border-blue-500 transition-colors"></div>

            <div className="relative z-10">
                <div className="flex justify-between items-start mb-4 md:mb-6">
                    <div className="w-10 h-10 md:w-12 md:h-12 bg-slate-50 border border-slate-100 rounded-md flex items-center justify-center group-hover:bg-[#0f172a] transition-all duration-300">
                        <Icon className="w-5 h-5 md:w-6 md:h-6 text-[#0f172a] group-hover:text-green-400 transition-colors" strokeWidth={1.5} />
                    </div>
                    {/* Node Icon */}
                    <Share2 className="w-4 h-4 text-slate-300 group-hover:text-blue-400 transition-colors" />
                </div>
                
                <h3 className="text-lg md:text-xl font-bold text-slate-900 mb-2 md:mb-3 group-hover:text-blue-900 transition-colors font-mono tracking-tight">{title}</h3>
                <p className="text-slate-600 mb-4 md:mb-6 text-sm leading-relaxed">{description}</p>
                
                <div className="space-y-2 md:space-y-3 pt-4 border-t border-slate-100 border-dashed">
                {features.map((feat, idx) => (
                    <div key={idx} className="flex items-center gap-3 text-xs font-semibold text-slate-500 font-mono">
                    <div className="w-1.5 h-1.5 rounded-full bg-slate-300 group-hover:bg-green-500 transition-colors"></div>
                    {feat}
                    </div>
                ))}
                </div>
            </div>
          </motion.div>
        );

        const TargetAudienceCard = ({ icon: Icon, title, description }) => (
          <div className="flex items-start gap-4 p-4 md:p-5 rounded-lg bg-slate-50 hover:bg-white hover:shadow-md transition-all duration-200 border border-slate-200 group relative">
            {/* Conector lateral */}
            <div className="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-1/2 w-1.5 h-6 bg-slate-300 rounded-r group-hover:bg-blue-500 transition-colors"></div>
            
            <div className="p-2 bg-white border border-slate-200 rounded shadow-sm text-slate-700 shrink-0 group-hover:text-blue-600 transition-colors">
              <Icon size={20} className="md:w-6 md:h-6" strokeWidth={1.5} />
            </div>
            <div>
              <h4 className="text-slate-900 font-bold mb-1 text-sm md:text-base group-hover:text-blue-900 transition-colors font-mono tracking-tight">{title}</h4>
              <p className="text-slate-500 text-xs md:text-sm leading-snug">{description}</p>
            </div>
          </div>
        );

        // --- Main App Component ---

        const App = () => {
          const [isScrolled, setIsScrolled] = useState(false);
          const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

          useEffect(() => {
            const handleScroll = () => {
              setIsScrolled(window.scrollY > 20);
            };
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          const scrollToSection = (id) => {
            const element = document.getElementById(id);
            if (element) {
              const yOffset = -80; 
              const y = element.getBoundingClientRect().top + window.pageYOffset + yOffset;
              window.scrollTo({ top: y, behavior: 'smooth' });
            }
            setMobileMenuOpen(false);
          };

          return (
            <div className="min-h-screen bg-white text-slate-900 font-sans selection:bg-blue-100 selection:text-blue-900 overflow-x-hidden relative">
              
              {/* Linha de Conexão Vertical (Backbone) */}
              <div className="absolute left-4 md:left-1/2 top-0 bottom-0 w-px bg-slate-200 border-l border-dashed border-slate-300 -z-10 hidden md:block"></div>

              {/* Navigation */}
              <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'bg-white/95 backdrop-blur-md border-b border-slate-200 py-3 shadow-sm' : 'bg-white/50 backdrop-blur-sm py-4 md:py-6'}`}>
                <div className="max-w-7xl mx-auto px-4 md:px-6 flex items-center justify-between">
                  <div className="flex items-center gap-2 md:gap-3 cursor-pointer" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                    <div className="w-8 h-8 md:w-10 md:h-10 bg-[#0f172a] rounded flex items-center justify-center relative overflow-hidden shrink-0 border border-slate-800">
                       {/* Grid no logo */}
                       <div className="absolute inset-0 bg-[linear-gradient(to_right,#ffffff_1px,transparent_1px),linear-gradient(to_bottom,#ffffff_1px,transparent_1px)] bg-[size:4px_4px] opacity-10"></div>
                       <MousePointer2 className="text-white w-4 h-4 md:w-5 md:h-5 relative z-10" fill="white" />
                       <div className="absolute -bottom-2 -right-2 w-4 h-4 bg-green-500 rounded-full blur-[2px]"></div>
                    </div>
                    <div className="flex flex-col">
                      <span className="text-xl font-light tracking-widest text-carbon uppercase flex items-center gap-1">
                          Carbon<span className="font-normal">Label</span>
                          <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse ml-1"></span>
                      </span>
                      <span className="text-[9px] md:text-[10px] font-semibold text-slate-500 tracking-widest uppercase flex items-center gap-1 font-mono">
                          <span className="text-slate-300">|</span> Intelligence Infra
                      </span>
                    </div>
                  </div>

                  {/* Desktop Menu */}
                  <div className="hidden md:flex items-center gap-1">
                    {['services', 'audience', 'why-us'].map((section) => (
                      <button 
                        key={section}
                        onClick={() => scrollToSection(section)} 
                        className="px-4 py-2 text-sm font-bold text-slate-600 hover:text-[#0f172a] rounded hover:bg-slate-100/50 transition-colors uppercase tracking-wide text-[11px] font-mono"
                      >
                        {section === 'services' ? 'Soluções' : section === 'audience' ? 'Segmentos' : 'Qualidade'}
                      </button>
                    ))}
                    <div className="ml-4 pl-4 border-l border-slate-200 flex items-center gap-3">
                       <div className="text-[10px] font-mono text-slate-400 hidden lg:block">v2.4.0</div>
                       <Button onClick={() => scrollToSection('contact')} variant="primary" className="px-5 py-2.5">Falar com Especialista</Button>
                    </div>
                  </div>

                  {/* Mobile Toggle */}
                  <button className="md:hidden text-slate-900 p-2 rounded hover:bg-slate-100 transition-colors border border-slate-200" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                    {mobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
                  </button>
                </div>

                {/* Mobile Menu */}
                <AnimatePresence>
                  {mobileMenuOpen && (
                    <>
                      <motion.div 
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        exit={{ opacity: 0 }}
                        className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 md:hidden"
                        onClick={() => setMobileMenuOpen(false)}
                      />
                      <motion.div 
                        initial={{ opacity: 0, y: -20 }}
                        animate={{ opacity: 1, y: 0 }}
                        exit={{ opacity: 0, y: -20 }}
                        className="absolute top-full left-0 right-0 bg-white border-b border-slate-200 shadow-xl z-50 md:hidden"
                      >
                        <div className="p-4 flex flex-col gap-2">
                          <div className="px-4 py-2 text-[10px] font-mono text-slate-400 border-b border-slate-100 mb-2">NAVIGATE_TO:</div>
                          <button onClick={() => scrollToSection('services')} className="text-left px-4 py-3 rounded hover:bg-slate-50 font-bold text-slate-700 flex items-center justify-between font-mono">Soluções <ArrowRight size={14}/></button>
                          <button onClick={() => scrollToSection('audience')} className="text-left px-4 py-3 rounded hover:bg-slate-50 font-bold text-slate-700 flex items-center justify-between font-mono">Segmentos <ArrowRight size={14}/></button>
                          <button onClick={() => scrollToSection('why-us')} className="text-left px-4 py-3 rounded hover:bg-slate-50 font-bold text-slate-700 flex items-center justify-between font-mono">Qualidade <ArrowRight size={14}/></button>
                          <div className="pt-2 mt-2 border-t border-slate-100">
                            <Button onClick={() => scrollToSection('contact')} className="w-full">Falar com Especialista</Button>
                          </div>
                        </div>
                      </motion.div>
                    </>
                  )}
                </AnimatePresence>
              </nav>

              {/* Hero Section */}
              <section className="relative pt-28 pb-16 md:pt-48 md:pb-32 px-4 md:px-6 overflow-hidden">
                <InfraBackground />
                
                <div className="max-w-7xl mx-auto relative z-10 text-center">
                  <FadeIn>
                    <div className="inline-flex items-center gap-2 px-3 py-1.5 md:px-4 rounded bg-white border border-blue-200 shadow-sm text-[10px] md:text-xs font-bold text-blue-900 mb-6 md:mb-8 mx-auto max-w-full font-mono">
                      <span className="relative flex h-2 w-2 shrink-0">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                      </span>
                      <span className="truncate">SYSTEM_STATUS: ONLINE // BRASIL_REGION</span>
                    </div>
                  </FadeIn>
                  
                  <FadeIn delay={0.1}>
                    <h1 className="text-4xl sm:text-5xl md:text-7xl font-extrabold text-slate-900 mb-6 md:mb-8 tracking-tight leading-[1.1] relative inline-block font-mono">
                      Dados Ruidosos<br />
                      <span className="text-slate-300 relative">
                        Quebram Modelos.
                        {/* Visual Glitch/Node Decoration */}
                        <span className="absolute -right-6 top-0 w-2 h-2 border border-slate-300 rounded-full hidden md:block"></span>
                        <span className="absolute -left-6 bottom-0 w-2 h-2 bg-slate-200 rounded-full hidden md:block"></span>
                      </span>
                    </h1>
                  </FadeIn>
                  
                  <FadeIn delay={0.2}>
                    <p className="text-lg md:text-xl text-slate-600 max-w-2xl mx-auto mb-8 md:mb-10 leading-relaxed px-2 font-medium">
                      Fornecemos o <span className="text-[#0f172a] font-bold bg-green-100 px-1 rounded-sm font-mono">Ground Truth</span> que a sua IA precisa. Infraestrutura de rotulagem com validação humana especializada.
                    </p>
                  </FadeIn>
                  
                  <FadeIn delay={0.3} className="flex flex-col sm:flex-row items-center justify-center gap-3 md:gap-4 px-4">
                    <Button onClick={() => scrollToSection('contact')} className="w-full sm:w-auto h-12 px-8 text-base">
                      Validar meu Dataset <ArrowRight size={18} />
                    </Button>
                    <Button variant="secondary" onClick={() => scrollToSection('services')} className="w-full sm:w-auto h-12 px-8 text-base">
                      Conhecer Plataforma
                    </Button>
                  </FadeIn>

                  {/* Stats Cards Floating with Connection Lines */}
                  <FadeIn delay={0.4} className="mt-16 md:mt-24 max-w-5xl mx-auto relative">
                     {/* Horizontal Connection Line */}
                     <div className="absolute top-1/2 left-10 right-10 h-px bg-slate-200 -z-10 hidden md:block"></div>
                     
                     <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-8">
                        {[
                        { val: "99.8%", label: "Precisão" },
                        { val: "ISO 27001", label: "Segurança" },
                        { val: "24h", label: "SLA Inicial" },
                        { val: "HITL", label: "Expert Review" }
                        ].map((item, i) => (
                        <div key={i} className="bg-white p-4 md:p-6 rounded shadow-sm border border-slate-200 flex flex-col items-center relative group">
                            {/* Top Connection Point */}
                            <div className="absolute -top-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-white border border-slate-300 rounded-full hidden md:block group-hover:border-blue-500"></div>
                            
                            <span className="text-xl md:text-2xl font-black text-[#0f172a] font-mono tracking-tighter">{item.val}</span>
                            <span className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-wide mt-1 font-mono">{item.label}</span>
                        </div>
                        ))}
                     </div>
                  </FadeIn>
                </div>
              </section>

              {/* Services Section */}
              <section id="services" className="py-16 md:py-24 px-4 md:px-6 bg-slate-50/50 relative border-t border-slate-200">
                <div className="max-w-7xl mx-auto relative z-10">
                  <FadeIn className="mb-10 md:mb-16 text-center md:text-left flex flex-col md:flex-row justify-between items-end gap-4">
                    <div>
                        <h2 className="text-3xl md:text-4xl font-bold text-slate-900 mb-4 flex items-center gap-2 font-mono tracking-tight">
                            <GitCommit className="text-blue-500"/> Capabilities
                        </h2>
                        <p className="text-slate-500 max-w-xl text-base md:text-lg">
                        Infraestrutura de dados como serviço (DaaS) com QA rigoroso.
                        </p>
                    </div>
                    <div className="text-[10px] font-mono text-slate-400 hidden md:block">
                        module: core_services <br/> status: active
                    </div>
                  </FadeIn>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                    <FadeIn delay={0.1}>
                      <ServiceCard 
                        icon={Type}
                        title="NLP & LLM Tuning"
                        description="Refinamento de modelos de linguagem com contexto local e especificidade de domínio."
                        features={["RLHF", "Classificação de Intenção", "NER"]}
                      />
                    </FadeIn>
                    <FadeIn delay={0.15}>
                      <ServiceCard 
                        icon={ScanLine}
                        title="Visão Computacional"
                        description="Precisão pixel-perfect para veículos autônomos, diagnósticos e varejo inteligente."
                        features={["Segmentação", "Bounding Box", "Keypoints"]}
                      />
                    </FadeIn>
                    <FadeIn delay={0.2}>
                      <ServiceCard 
                        icon={Mic}
                        title="Fala & Áudio"
                        description="Transcrição e classificação de áudio para assistentes virtuais e análise de call center."
                        features={["ASR Training", "Sentiment Analysis", "Speaker ID"]}
                      />
                    </FadeIn>
                    <FadeIn delay={0.25}>
                      <ServiceCard 
                        icon={FileSearch}
                        title="Auditoria de Dados"
                        description="Diagnóstico completo de datasets existentes para identificar viés e inconsistências."
                        features={["Detecção de Viés", "Limpeza", "Balanceamento"]}
                      />
                    </FadeIn>
                    <FadeIn delay={0.3}>
                      <ServiceCard 
                        icon={CheckCircle2}
                        title="Validação HITL"
                        description="Loop humano para casos de baixa confiança do modelo em produção."
                        features={["Real-time Review", "Feedback Loop", "Correction"]}
                      />
                    </FadeIn>
                    <FadeIn delay={0.35}>
                      <ServiceCard 
                        icon={Database}
                        title="Data Ops"
                        description="Consultoria estratégica para arquitetura de pipelines de dados escaláveis."
                        features={["Pipeline Design", "Synthetic Data", "Ontology"]}
                      />
                    </FadeIn>
                  </div>
                </div>
              </section>

              {/* Target Audience & Diagram */}
              <section id="audience" className="py-16 md:py-24 px-4 md:px-6 bg-white overflow-hidden border-t border-slate-200">
                <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-12 md:gap-20 items-center">
                  <div className="lg:w-5/12 w-full">
                    <FadeIn>
                      <h2 className="text-3xl md:text-4xl font-bold text-slate-900 mb-4 md:mb-6 text-center md:text-left flex items-center gap-2 justify-center md:justify-start font-mono tracking-tight">
                         <Network className="text-green-500" /> Focado em Produção
                      </h2>
                      <p className="text-slate-600 mb-8 md:mb-10 text-base md:text-lg leading-relaxed text-center md:text-left">
                        Não somos uma plataforma de crowdsourcing genérica. Somos parceiros de engenharia para quem não pode errar em produção.
                      </p>
                    </FadeIn>
                    <div className="flex flex-col gap-3 md:gap-4 border-l-2 border-slate-100 pl-4 md:pl-0 md:border-l-0">
                       {[
                         { icon: Code2, title: "Startups de GenAI", desc: "Acelere o RLHF e chegue ao mercado mais rápido." },
                         { icon: BrainCircuit, title: "Labs de Pesquisa", desc: "Dados puros para benchmarks científicos." },
                         { icon: Building2, title: "Enterprise", desc: "Segurança bancária para dados sensíveis." }
                       ].map((item, idx) => (
                         <FadeIn key={idx} delay={0.1 * idx}>
                           <TargetAudienceCard {...item} />
                         </FadeIn>
                       ))}
                    </div>
                  </div>
                  
                  <div className="lg:w-7/12 w-full relative mt-8 lg:mt-0">
                    {/* Grid Pattern Behind Diagram */}
                    <div className="absolute inset-0 bg-[linear-gradient(to_right,#f0fdf4_1px,transparent_1px),linear-gradient(to_bottom,#f0fdf4_1px,transparent_1px)] bg-[size:1rem_1rem] opacity-50 rounded-3xl"></div>
                    
                    {/* Diagrama Estilizado - Mobile Friendly */}
                    <div className="relative bg-white border border-slate-200 rounded-lg p-4 md:p-8 shadow-2xl shadow-slate-200/50">
                       {/* Decorative Nodes on Diagram Container */}
                       <div className="absolute -left-1 top-1/2 w-2 h-2 bg-slate-300 rounded-full"></div>
                       <div className="absolute -right-1 top-1/2 w-2 h-2 bg-slate-300 rounded-full"></div>

                      <div className="flex justify-between items-center border-b border-slate-100 pb-4 md:pb-6 mb-4 md:mb-6">
                        <div className="flex gap-2">
                           <div className="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                           <div className="w-2.5 h-2.5 rounded-full bg-slate-200"></div>
                        </div>
